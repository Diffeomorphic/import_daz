schema_version = "1.0.0"

id = "import_daz"
version = "4.3.0"
name = "DAZ Importer"
tagline = "Importer for native DAZ files (.duf, .dsf)"
maintainer = "Thomas Larsson <thomas.larsson.01@gmail.com>"
type = "add-on"
website = "https://bitbucket.org/Diffeomorphic/import_daz/wiki/Home/"
tags = ["Import-Export", "Animation"]
